services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data          # index lives at /app/data/index (set via PODCODEX_INDEX)
      - ./shows.toml:/app/shows.toml:ro   # optional: remove to disable access control
      - model_cache:/root/.cache  # BGE-M3 model cache — persisted across rebuilds
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  model_cache:
