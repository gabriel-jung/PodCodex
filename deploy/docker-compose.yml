services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 512M
    # healthcheck:
    #   test: ["CMD-SHELL", "cat < /dev/tcp/localhost/6333 || exit 1"]
    #   interval: 5s
    #   timeout: 3s
    #   retries: 5
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      qdrant:
        condition: service_started
    env_file:
      - .env.production
    environment:
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  qdrant_data:
  model_cache:
