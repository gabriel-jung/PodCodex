services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env
    volumes:
      # Index directory — same path as the desktop app and the uv install use
      # by default, so a single location works for everyone. Override by
      # setting PODCODEX_INDEX_HOST in .env if your index lives elsewhere.
      - ${PODCODEX_INDEX_HOST:-~/.local/share/podcodex/index}:/root/.local/share/podcodex/index
      - model_cache:/root/.cache  # BGE-M3 model cache — persisted across rebuilds
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  model_cache:
