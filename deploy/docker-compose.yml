services:
  bot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - .env.production
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache
    deploy:
      resources:
        limits:
          memory: 3G
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  model_cache:
