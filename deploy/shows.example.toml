# Show access configuration for podcodex-bot.
#
# Each [shows.<key>] block registers a show that server admins can
# unlock via the /unlock slash command.
#
# Add shows interactively:
#   docker compose run --rm bot --add-show --shows-config /app/shows.toml
#
# Or generate a hash manually:
#   docker compose run --rm bot --hash-password
#
# Usage:
#   podcodex-bot --shows-config shows.toml [other flags]

