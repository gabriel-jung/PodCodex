services:
  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  qdrant_data:
